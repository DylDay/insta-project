<!doctype html>
<html lang="en">

<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for insta-project">

  <style>
    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
      background-color: var(--ddd-theme-default-white);
    }
    body {
      display: flex;
      justify-content: center;
    }
    insta-project {
      margin: var(--ddd-spacing-2);
      border: var(--ddd-border-md);
      box-shadow: var(--ddd-boxShadow-sm);
    }
    @media (prefers-color-scheme: dark) {
      :root, html, body {
        background-color: #1E1F23;
      }
    }
  </style>
  <title>insta-project</title>
</head>

<body>
  <insta-project current-index="3">
    <play-list-slide top-heading="Username" second-heading="3 hours ago">
    </play-list-slide>
    <play-list-slide top-heading="Custom heading" second-heading="I'm Mary Poppins y'all!">
    </play-list-slide>
    <play-list-slide top-heading="To become King of the Pirates" second-heading="Monkey D. Luffy">
    </play-list-slide>
    <play-list-slide top-heading="To chart a map of the world" second-heading="Nami">
    </play-list-slide>
  </insta-project>
  <script type="module" src="insta-project.js"></script>
  <script type="module" src="./lib/play-list-slide.js"></script>
  <script type="module" src="./lib/play-list-slide-arrow.js"></script>
  <script type="module" src="./lib/play-list-slide-indicator.js"></script>
</body>
</html>
